<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Password</title>
    <meta charset="UTF-8">
    <meta name="author" content="Marko Bošnjak">
    <meta name="description" content="Curriculum Vitae">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="<%= baseUrl %>/images/cvFavicon.ico" rel="icon">
    <link href="/stylesheets/fontawesome/css/all.css" rel="stylesheet" type="text/css">
    <link href="/css/bootstrap.min.css" rel="stylesheet" type="text/css">
    <link href="../style/page.css" rel="stylesheet" type="text/css">
    <link href="../style/style.css" rel="stylesheet" type="text/css">
    <script src="/popper/popper.min.js"></script>
    <script src="/js/bootstrap.min.js"></script>
    <script src="/jquery/jquery.js"></script>
    <script type="module" src="../handlers/password.js"></script>
  </head>
  <body>
    <div class="container-fluid">
      <div class="d-flex" id="pageContent">
        <%- include("components/sidebar.html", { baseUrl: `${baseUrl}` }); %>
        <div id="pageStyle">
          <%- include("components/navigation.html", { baseUrl: `${baseUrl}` }); %>
          <h1 class="center">Reset password</h1>
          <div class="mb-3 password position">
            <form id="passwordForm" autocomplete="off" novalidate>
              <div class="mb-3">
                <div class="input-group">
                  <input type="password" id="password" class="form-control" placeholder="Password" />
                  <div class="input-group-append">
                    <button type="button" id="toggleButton" class="btn btn-light" data-toggle="tooltip" title="Password has to have at least 8 characters, including uppercase and lowercase letters, digits and special characters."><i id="togglePassword" class="fa fa-eye-slash"></i></button>
                  </div>
                </div>
                <small id="passwordError" class="form-text error">Please provide a valid password!</small>
              </div>
              <div class="mb-3 action">
                <button type="submit" class="btn btn-primary">Reset</button>
              </div>
            </form>
          </div>
          <%- include("components/notification.html"); %>
        </div>
      </div>
    </div>
  </body>
</html>
