<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Downloads</title>
    <meta charset="UTF-8">
    <meta name="author" content="Marko Bošnjak">
    <meta name="description" content="Curriculum Vitae">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="<%= baseUrl %>/images/cvFavicon.ico" rel="icon">
    <link href="/stylesheets/fontawesome/css/all.css" rel="stylesheet" type="text/css">
    <link href="/css/bootstrap.min.css" rel="stylesheet" type="text/css">
    <link href="../style/page.css" rel="stylesheet" type="text/css">
    <link href="../style/style.css" rel="stylesheet" type="text/css">
    <script src="/popper/popper.min.js"></script>
    <script src="/js/bootstrap.min.js"></script>
    <script src="/jquery/jquery.js"></script>
  </head>
  <body>
    <div class="container-fluid">
      <div class="d-flex" id="pageContent">
        <%- include("components/sidebar.html", { baseUrl: `${baseUrl}` }); %>
        <div id="pageStyle">
          <%- include("components/navigation.html", { baseUrl: `${baseUrl}` }); %>
          <h1 class="center">Downloads</h1>
          <div class="downloads position">
            <% if (exist) { %>
              <div class="row">
                <div class="col-6">
                  <h3 class="center">English</h3>
                  <embed src="../custom/<%= cvEnglishName %>" width="600" height="600" type="application/pdf" />
                  <div class="mb-3 center">
                    <a href="../custom/<%= cvEnglishName %>" target="_blank" class="btn btn-primary">Open <i class="fas fa-external-link-square-alt"></i></a>
                    <a href="../custom/<%= cvEnglishName %>" download="<%= cvEnglishName %>" class="btn btn-primary">Download <i class="fas fa-file-download"></i></a>
                  </div>
                </div>
                <div class="col-6">
                  <h3 class="center">German</h3>
                  <embed src="../custom/<%= cvGermanName %>" width="600" height="600" type="application/pdf" />
                  <div class="mb-3 center">
                    <a href="../custom/<%= cvGermanName %>" target="_blank" class="btn btn-primary">Open <i class="fas fa-external-link-square-alt"></i></a>
                    <a href="../custom/<%= cvGermanName %>" download="<%= cvGermanName %>" class="btn btn-primary">Download <i class="fas fa-file-download"></i></a>
                  </div>
                </div>
              </div>
            <% } else { %>
              <div class="alert alert-dark center" role="alert">No downloads available!</div>
            <% } %>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
